<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login de actas bautismales</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1><em>Parroquia Quingeo</em></h1>
        <h2><em>Página administrador</em></h2>
    </header>

    <section>
        <form>
            <label for="Usuario">Usuario</label>
            <input type="text" placeholder="Ejm: Pedro" id="Usuario">

            <br><br>

            <label for="Contrasena">Contraseña:</label>
            <div style="display:flex;align-items:center;gap:8px;">
                <input type="password" placeholder="Ejm: 12345" id="Contrasena" style="flex:1;">
                <button type="button" id="togglePassword" aria-label="Mostrar contraseña" style="padding:6px 10px;cursor:pointer;">Mostrar</button>
            </div>
        </form>
    </section>

    <div class="contenedor-boton">
        <button type="button" onclick="ver()">Ingresar</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="script.js"></script>

    <script>
        (function(){
            const pwd = document.getElementById('Contrasena');
            const btn = document.getElementById('togglePassword');
            if (!pwd || !btn) return;
            btn.addEventListener('click', () => {
                const isPassword = pwd.type === 'password';
                pwd.type = isPassword ? 'text' : 'password';
                btn.textContent = isPassword ? 'Ocultar' : 'Mostrar';
                btn.setAttribute('aria-label', isPassword ? 'Ocultar contraseña' : 'Mostrar contraseña');
            });
        })();
    </script>

</body>
</html>
