<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de actas bautismales</title>
    <link rel="stylesheet" href="style3.css">
</head>

<body>

    <header>
        <h1>Registro de actas bautismales</h1>
        <h2>Parroquia Quingeo</h2>
    </header>

    <form class="formulario" onsubmit="return false;">

        <label for="primer_nombre">Primer nombre</label>
        <input type="text" id="primer_nombre" placeholder="Primer nombre" required>

        <label for="segundo_nombre">Segundo nombre</label>
        <input type="text" id="segundo_nombre" placeholder="Segundo nombre" required>

        <label for="primer_apellido">Primer apellido</label>
        <input type="text" id="primer_apellido" placeholder="Primer apellido" required>

        <label for="segundo_apellido">Segundo apellido</label>
        <input type="text" id="segundo_apellido" placeholder="Segundo apellido" required>

        <label for="fecha_nacimiento">Fecha de nacimiento</label>
        <input type="date" id="fecha_nacimiento" required>

        <label for="lugar_nacimiento">Lugar de nacimiento</label>
        <input type="text" id="lugar_nacimiento" placeholder="Lugar de nacimiento" required>

        <label for="lugar_bautismo">Lugar de bautismo</label>
        <input type="text" id="lugar_bautismo" placeholder="Lugar de bautismo" required>

        <label for="fecha_bautismo">Fecha de bautismo</label>
        <input type="date" id="fecha_bautismo" required>

        <label for="padre">Padre</label>
        <input type="text" id="padre" placeholder="Padre" required>

        <label for="madre">Madre</label>
        <input type="text" id="madre" placeholder="Madre" required>

        <label for="padrino">Padrino</label>
        <input type="text" id="padrino" placeholder="Padrino" required>

        <label for="madrina">Madrina</label>
        <input type="text" id="madrina" placeholder="Madrina" required>

        <label for="sacerdote">Presbitero</label>
        <input type="text" id="sacerdote" placeholder="Presbitero" required>

        <label for="libro_acta">Libro / Tomo</label>
        <input type="text" id="libro_acta" placeholder="Libro o Tomo" required>

        <label for="pagina_acta">Página del Acta</label>
        <input type="text" id="pagina_acta" placeholder="Ej. 45 o 45-vta" required>

        <label for="numero_acta">Número de Acta</label>
        <input type="text" id="numero_acta" placeholder="Ej. 102 o 102-B" required>

        <div class="form-actions">
            <button type="button" onclick="guardarActa()">
                Guardar Acta
            </button>
            <button type="button" class="btn-regresar" onclick="window.location.href='index2.html'">
                Regresar a Bautizados
            </button>
        </div>

    </form>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="script.js"></script>

</body>

</html>
