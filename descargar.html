<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargar Acta</title>
    <link rel="stylesheet" href="style3.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <main class="impresion-contenedor">
        <section id="actaDetalle" class="documento"></section>

        <div class="botones-impresion">
            <button id="descargarPDFBtn">Descargar PDF</button>
            <button id="editarBtn">Editar</button>
            <button id="imprimirBtn">Imprimir</button>
            <button id="regresarBtn">Volver</button>
        </div>
    </main>

    <script>
        function mostrarActa() {
            const acta = JSON.parse(localStorage.getItem("actaParaImprimir") || "null");
            const contenedor = document.getElementById("actaDetalle");
            if (!acta) {
                contenedor.innerHTML = "<p>No se encontró ningún dato para imprimir.</p>";
                return;
            }

            const nombreCompleto = `${acta.primer_nombre} ${acta.segundo_nombre || ''} ${acta.primer_apellido} ${acta.segundo_apellido || ''}`.replace(/\s+/g, ' ').trim();
            const fechaNacimiento = acta.fecha_nacimiento || acta.ano_nacimiento || "No disponible";

            contenedor.innerHTML = `
                <div class="documento-header">
                    <div class="logo-placeholder">
                        <img src="logo.jpg" alt="Logo Parroquia Quingeo">
                    </div>
                    <div class="documento-titulo">
                        <p class="header-line uppercase">ARQUIDIÓCESIS DE CUENCA</p>
                        <p class="header-line">Parroquia Eclesiástica</p>
                        <p class="header-title">"SAN PEDRO DE QUINGEO"</p>
                        <p class="header-line secondary">Vicaría San Juan Bautista</p>
                    </div>
                </div>
                <p class="header-main-title">CERTIFICADO DE BAUTISMO</p>
                <div class="documento-content documento-content--wide">
                    <p class="documento-doc documento-doc--line">
                        <span class="documento-doc-item"><strong>Tomo:</strong> ${acta.libro_acta || 'No disponible'}</span>
                        <span class="documento-doc-item"><strong>Página:</strong> ${acta.pagina_acta || 'No disponible'}</span>
                        <span class="documento-doc-item"><strong>N° acta:</strong> ${acta.numero_acta || 'No disponible'}</span>
                    </p>
                    <p><strong>Nombre:</strong> ${nombreCompleto}</p>
                    <p><strong>Fecha de nacimiento:</strong> ${fechaNacimiento} <strong>Lugar de nacimiento:</strong> ${acta.lugar_nacimiento || 'No disponible'}</p>
                    <p><strong>Año de bautismo:</strong> ${acta.ano_bautismo || 'No disponible'} <strong>Lugar de bautismo:</strong> ${acta.lugar_bautismo || 'No disponible'}</p>
                    <p><strong>Padre:</strong> ${acta.padre || 'No disponible'}<br><strong>Madre:</strong> ${acta.madre || 'No disponible'}</p>
                    <p><strong>Padrino:</strong> ${acta.padrino || 'No disponible'}<br><strong>Madrina:</strong> ${acta.madrina || 'No disponible'}</p>
                    <p><strong>Presbitero:</strong> ${acta.sacerdote || 'No disponible'}</p>
                    <div class="nota-marginal">
                        <p class="nota-marginal-title"><strong>Nota marginal</strong></p>
                        <p class="nota-marginal-line"></p>
                        <p class="nota-marginal-line"></p>
                    </div>
                    <div class="linea-quingeo">
                        <span>Quingeo __________________ de ____________________ 20__</span>
                    </div>
                </div>
                <div class="documento-footer">
                    <div class="firma-placeholder">
                        <div class="firma-line"></div>
                    </div>
                </div>
                <p class="telefono">Telf: (07) 4149337</p>
            `;
        }

        document.getElementById("descargarPDFBtn").addEventListener("click", async () => {
            const jsPDF = window.jspdf?.jsPDF || window.jsPDF;
            if (!jsPDF) {
                alert('No se pudo cargar la librería de PDF. Recarga la página e intenta otra vez.');
                return;
            }

            const actaElement = document.getElementById("actaDetalle");
            const originalWidth = actaElement.style.width;
            actaElement.style.width = '820px';

            try {
                const canvas = await html2canvas(actaElement, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    useCORS: true,
                });

                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF({ unit: 'pt', format: 'letter' });
                const pageWidth = pdf.internal.pageSize.getWidth();
                const imgWidth = pageWidth - 2 * 40;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;

                pdf.addImage(imgData, 'PNG', 40, 40, imgWidth, imgHeight);
                pdf.save('Acta_Bautismo_Quingeo.pdf');
            } catch (error) {
                console.error('Error al generar PDF:', error);
                alert('No se pudo generar el PDF. Por favor intenta de nuevo.');
            } finally {
                actaElement.style.width = originalWidth;
            }
        });

        document.getElementById("imprimirBtn").addEventListener("click", () => {
            window.print();
        });

        document.getElementById("editarBtn").addEventListener("click", () => {
            const acta = JSON.parse(localStorage.getItem("actaParaImprimir") || "null");
            if (acta) {
                localStorage.setItem("actaParaEditar", JSON.stringify(acta));
            }
            window.location.href = "index3.html";
        });

        document.getElementById("regresarBtn").addEventListener("click", () => {
            window.location.href = "index2.html";
        });

        mostrarActa();
    </script>
</body>
</html>
