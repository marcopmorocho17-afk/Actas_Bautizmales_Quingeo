<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de actas bautismales</title>

    <link rel="stylesheet" href="style3.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <header>
        <h1>Registro de actas bautismales</h1>
        <h2>Parroquia Quingeo</h2>
    </header>

    <section class="formulario">

        <label>Nombres</label>
        <input type="text" id="nombres" placeholder="Nombres">

        <label>Apellidos</label>
        <input type="text" id="apellidos" placeholder="Apellidos">

        <label>Fecha de nacimiento</label>
        <input type="date" id="fecha_nacimiento">

        <label>Lugar de nacimiento</label>
        <input type="text" id="lugar_nacimiento" placeholder="Lugar de nacimiento">

        <label>Fecha de bautismo</label>
        <input type="date" id="fecha_bautismo">

        <label>Parroquia</label>
        <input type="text" id="parroquia" placeholder="Parroquia">

        <label>Padre</label>
        <input type="text" id="padre" placeholder="Padre">

        <label>Madre</label>
        <input type="text" id="madre" placeholder="Madre">

        <label>Padrino</label>
        <input type="text" id="padrino" placeholder="Padrino">

        <label>Madrina</label>
        <input type="text" id="madrina" placeholder="Madrina">

        <label>Sacerdote</label>
        <input type="text" id="sacerdote" placeholder="Sacerdote">

        <label>Tomo</label>
        <input type="number" id="tomo" placeholder="Tomo">

        <label>Página</label>
        <input type="number" id="pagina" placeholder="Página">

        <label>Número de acta</label>
        <input type="number" id="numero_acta" placeholder="Número de Acta">

        <button type="button" onclick="guardarActa()">
            Guardar Acta
        </button>

    </section>

    <script>

        const supabase = window.supabase.createClient(
            "https://gwzksvqidqfwwrehyonc.supabase.co",
            "sb_publishable_Pprp0PSkxKfc7ieELFxOgQ_zR4rkDVf"
        );

        async function guardarActa() {

            const { error } = await supabase
                .from("actas_bautismales")
                .insert([
                    {
                        nombres: document.getElementById("nombres").value,
                        apellidos: document.getElementById("apellidos").value,
                        fecha_nacimiento: document.getElementById("fecha_nacimiento").value,
                        lugar_nacimiento: document.getElementById("lugar_nacimiento").value,
                        fecha_bautismo: document.getElementById("fecha_bautismo").value,
                        parroquia: document.getElementById("parroquia").value,
                        padre: document.getElementById("padre").value,
                        madre: document.getElementById("madre").value,
                        padrino: document.getElementById("padrino").value,
                        madrina: document.getElementById("madrina").value,
                        sacerdote: document.getElementById("sacerdote").value,
                        tomo: Number(document.getElementById("tomo").value),
                        pagina: Number(document.getElementById("pagina").value),
                        numero_acta: Number(document.getElementById("numero_acta").value)
                    }
                ]);

            if (error) {
                console.error(error);
                alert("Error: " + error.message);
                return;
            }

            alert("Acta guardada correctamente.");

            document.querySelector(".formulario").reset();

        }

    </script>

</body>

</html>
